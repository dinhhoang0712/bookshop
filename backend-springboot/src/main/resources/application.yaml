spring:
  datasource:
    url: jdbc:mysql://localhost:3306/bookshop
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  data:
    web:
      pageable:
        one-indexed-parameters: true
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: ${REDIS_TIMEOUT:6000}

  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 50MB

  sendgrid:
    api-key: ${SENDGRID_API_KEY}
    from-email: ${SENDGRID_FROM_EMAIL:vuhoang5053@gmail.com}
    template-id: ${SENDGRID_TEMPLATE_ID}
    url: ${SENDGRID_VERIFY_URL:http://localhost:3000/verify-email}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:3000/auth/google/callback}
            scope:
              - email
              - profile

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}

server:
  port: ${SERVER_PORT:8080}

vuhoang:
  jwt:
    base64:
      secret: ${JWT_SECRET}
    access-token-validity-in-seconds: ${JWT_ACCESS_TOKEN_VALIDITY:86400}
    refresh-token-validity-in-seconds: ${JWT_REFRESH_TOKEN_VALIDITY:2592000}

  upload-file:
    base-uri: ${UPLOAD_FILE_BASE_URI:file:///D:/Dev/web-book/upload/image/}

debug: true
